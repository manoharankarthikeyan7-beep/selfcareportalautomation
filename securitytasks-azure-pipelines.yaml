trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: AppSecrets 
  - name: webAppName
    value: 'PipelineAPI' 
  - name: azureServiceConnection
    value: 'Azure subscription 1 (e26f51cc-2002-4eef-9131-5841b18763a7)' 
  - name: resourceGroupName
    value: 'pipelineautomationapi'
  
  # SECURITY IDs: Values mapped from your SonarCloud dashboard
  - name: sonarCloudOrg
    value: 'senthiln0281'
  - name: sonarProjectKey
    value: 'senthiln0281_Pipeline'

stages:
- stage: Security_and_Build
  displayName: 'Scan and Build'
  jobs:
  - job: Secure_Build
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    # --- SECTION 1: SONARCLOUD PREPARATION ---
    # UPDATED: Using version @3 to match the latest marketplace standard.
    # This prepares the environment for code quality analysis.
    - task: SonarCloudPrepare@3
      displayName: 'Prepare SonarCloud'
      inputs:
        SonarCloud: 'SonarCloudConnection'
        organization: '$(sonarCloudOrg)'
        scannerMode: 'CLI'
        configMode: 'manual'
        projectKey: '$(sonarProjectKey)'
        projectName: 'PipelineGenerator'

    - script: |
        cd backend
        npm install
      displayName: 'Install Backend'

    - script: |
        cd frontend
        npm install
        npm run build
      displayName: 'Build Frontend'

    # --- SECTION 2: SNYK VULNERABILITY SCAN ---
    # This checks your npm dependencies for known security exploits.
    # It is set to fail the build if high-severity issues are found.
    - task: SnykSecurityScan@1
      displayName: 'Snyk Security Scan'
      inputs:
        serviceConnectionEndpoint: 'SnykConnection'
        testType: 'app'
        monitorOnBuild: true
        failOnIssues: true
        organization: '262c0b5b-633f-4261-a4b6-762bc547c1e9'

    # --- SECTION 3: SONARCLOUD ANALYSIS ---
    # UPDATED: Using version @2 for the actual execution step.
    # Runs the scan and publishes results back to your SonarCloud dashboard.
    - task: SonarCloudAnalyze@2
      displayName: 'Run SonarCloud Analysis'

    - task: SonarCloudPublish@2
      displayName: 'Publish SonarCloud Results'
      inputs:
        pollingTimeoutSec: '300'

    # --- SECTION 4: MERGE & ARCHIVE ---
    # Combines the React build into the Express 'public' folder for a unified deployment.
    - script: |
        mkdir -p backend/public
        cp -r frontend/build/* backend/public/
      displayName: 'Merge Frontend to Backend'

    - task: ArchiveFiles@2
      displayName: 'Create Deployment Package'
      inputs:
        rootFolderOrFile: 'backend'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'

    - publish: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
      artifact: drop

- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Security_and_Build
  # SECURITY CHECK: Only deploy if the security scans and build were successful.
  condition: succeeded() 
  jobs:
  - job: DeployWeb
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - download: current
      artifact: drop

    - task: AzureWebApp@1
      displayName: 'Azure Web App Deploy'
      inputs:
        azureSubscription: $(azureServiceConnection)
        appType: 'webAppLinux'
        appName: $(webAppName)
        resourceGroupName: $(resourceGroupName)
        package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
        runtimeStack: 'NODE|18-lts'