trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: AppSecrets 
  - name: webAppName
    value: 'PipelineAPI' 
  - name: azureServiceConnection
    value: 'Azure subscription 1 (e26f51cc-2002-4eef-9131-5841b18763a7)' 
  - name: resourceGroupName
    value: 'pipelineautomationapi'
  - name: sonarCloudOrg
    value: 'senthiln0281'
  - name: sonarProjectKey
    value: 'senthiln0281_Pipeline'
  - name: NODE_OPTIONS
    value: '--max-old-space-size=4096'
  # --- NEW DOCKER VARIABLES ---
  - name: containerRegistryConnection
    value: 'MyACRConnection' # Replace with your Azure DevOps Service Connection name
  - name: imageRepository
    value: 'pipeline-generator'
  - name: dockerfilePath
    value: '**/Dockerfile'

stages:
- stage: Security_and_Build
  displayName: 'Scan and Build'
  jobs:
  - job: Secure_Build
    steps:
    - task: NodeTool@0
      displayName: 'Install Node.js 20'
      inputs:
        versionSpec: '20.x'

    - task: SonarCloudPrepare@3
      displayName: 'Prepare SonarCloud'
      inputs:
        SonarCloud: 'SonarCloudConnection'
        organization: '$(sonarCloudOrg)'
        scannerMode: 'CLI'
        configMode: 'manual'
        cliProjectKey: '$(sonarProjectKey)'
        cliProjectName: 'PipelineGenerator'
        extraProperties: |
          sonar.sources=.
          sonar.exclusions=**/node_modules/**, **/build/**, **/dist/**
          sonar.javascript.node.maxspace=4096

    - script: |
        cd backend
        npm install --ignore-scripts
      displayName: 'Install Backend'

    - script: |
        cd frontend
        npm install --ignore-scripts
        npm run build
      displayName: 'Build Frontend'

    - task: SnykSecurityScan@1
      displayName: 'Snyk Security Scan'
      inputs:
        serviceConnectionEndpoint: 'SnykConnection'
        testType: 'app'
        monitorOnBuild: true
        failOnIssues: true 
        organization: '262c0b5b-633f-4261-a4b6-762bc547c1e9'
        additionalArguments: '--all-projects'

    - task: SonarCloudAnalyze@3
      displayName: 'Run SonarCloud Analysis'

    - task: SonarCloudPublish@3
      displayName: 'Publish Quality Gate Result'
      inputs:
        pollingTimeoutSec: '300'

# --- NEW STAGE: CONTAINERIZE ---
- stage: Containerize
  displayName: 'Docker Build & Push'
  dependsOn: Security_and_Build
  condition: succeeded()
  jobs:
  - job: Docker_Push
    steps:
    - task: Docker@2
      displayName: 'Build and Push to ACR'
      inputs:
        containerRegistry: '$(containerRegistryConnection)'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: '$(dockerfilePath)'
        tags: |
          $(Build.BuildId)
          latest

# --- UPDATED DEPLOY STAGE (For K8s transition) ---
- stage: Deploy
  displayName: 'Deploy to K8s'
  dependsOn: Containerize
  condition: succeeded() 
  jobs:
  - job: DeployK8s
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    # NOTE: This is where we will add the Kubectl commands once your cluster is ready.
    - script: echo "Ready to deploy image $(imageRepository):$(Build.BuildId) to Kubernetes"
      displayName: 'K8s Deployment Placeholder'